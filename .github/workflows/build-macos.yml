name: Build macOS

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Build macOS app
        run: npm run tauri -- build --target aarch64-apple-darwin --bundles dmg

      - name: Get version
        id: version
        run: |
          VERSION=$(python3 - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path("src-tauri/tauri.conf.json").read_text())
          print(data["version"])
          PY
          )
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg

      - name: Create or update release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"

          # Find the DMG
          DMG=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/dmg -name "*.dmg" | head -1)
          DMG_NAME=$(basename "$DMG")

          echo "Found DMG: $DMG"
          echo "Version: $VERSION"

          # Check if release exists
          if gh release view "v${VERSION}" > /dev/null 2>&1; then
            echo "Release v${VERSION} exists, uploading macOS DMG..."
            gh release upload "v${VERSION}" "$DMG" --clobber
          else
            echo "Creating new release v${VERSION}..."
            gh release create "v${VERSION}" \
              --title "v${VERSION}" \
              --notes "macOS release for v${VERSION}" \
              --target "$GITHUB_SHA" \
              "$DMG"
          fi
